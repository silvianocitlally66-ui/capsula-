<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cápsula Digital — Citlally</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --neon-green: #00ff9f;
      --neon-cyan: #00e5ff;
      --neon-pink: #ff007f;
      --bg: #080c10;
      --grid: rgba(0,255,159,0.04);
      --border: rgba(0,229,255,0.2);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--neon-cyan);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow: hidden;
      cursor: none;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.13) 2px, rgba(0,0,0,0.13) 4px);
      pointer-events: none;
      z-index: 0;
    }
    .hud-corner { position: fixed; width: 55px; height: 55px; z-index: 5; pointer-events: none; }
    .hud-corner::before, .hud-corner::after { content: ''; position: absolute; background: var(--neon-cyan); }
    .hud-corner::before { width: 100%; height: 2px; top: 0; }
    .hud-corner::after  { width: 2px; height: 100%; top: 0; }
    .hud-corner.tl { top: 14px; left: 14px; }
    .hud-corner.tr { top: 14px; right: 14px; transform: scaleX(-1); }
    .hud-corner.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
    .hud-corner.br { bottom: 14px; right: 14px; transform: scale(-1); }
    header {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 80px;
      z-index: 10;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,16,0.75);
      backdrop-filter: blur(8px);
    }
    .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1rem; letter-spacing: 0.25em; color: var(--neon-green); text-shadow: 0 0 12px var(--neon-green); }
    .status-bar { font-size: 0.65rem; letter-spacing: 0.15em; color: rgba(0,229,255,0.5); }
    .status-bar span { color: var(--neon-green); animation: blink 1.4s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .scene { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; }
    .center-panel { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .caption { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; letter-spacing: 0.3em; color: rgba(0,229,255,0.4); text-transform: uppercase; }
    .chest-wrap { position: relative; cursor: none; }
    .chest-wrap::before {
      content: ''; position: absolute; inset: -20px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.1) 0%, transparent 70%);
      animation: pulse-ring 2.2s ease-in-out infinite; pointer-events: none;
    }
    @keyframes pulse-ring { 0%,100%{transform:scale(0.88);opacity:0.55} 50%{transform:scale(1.1);opacity:1} }
    #chest { width: 140px; height: 140px; object-fit: contain; filter: drop-shadow(0 0 14px var(--neon-cyan)) drop-shadow(0 0 35px rgba(0,229,255,0.25)); transition: transform 0.15s, filter 0.15s; cursor: none; display: block; }
    #chest:hover { transform: scale(1.08) rotate(-2deg); filter: drop-shadow(0 0 22px var(--neon-pink)) drop-shadow(0 0 45px rgba(255,0,127,0.35)); }
    .click-hint { font-size: 0.62rem; letter-spacing: 0.25em; color: var(--neon-pink); text-shadow: 0 0 8px var(--neon-pink); animation: flicker 3s ease-in-out infinite; }
    @keyframes flicker { 0%,100%{opacity:1} 47%{opacity:1} 50%{opacity:0.2} 53%{opacity:1} 84%{opacity:1} 88%{opacity:0.35} 92%{opacity:1} }
    #guardian { position: fixed; width: 80px; height: 80px; object-fit: contain; pointer-events: none; z-index: 20; filter: drop-shadow(0 0 10px var(--neon-green)) drop-shadow(0 0 22px rgba(0,255,159,0.3)); transform: translate(-50%, -50%); }
    #cursor-dot { position: fixed; width: 6px; height: 6px; background: var(--neon-cyan); border-radius: 50%; pointer-events: none; z-index: 21; transform: translate(-50%, -50%); box-shadow: 0 0 7px var(--neon-cyan); }
    .data-stream { position: fixed; top: 0; bottom: 0; width: 1px; background: linear-gradient(to bottom, transparent, var(--neon-cyan), transparent); opacity: 0; animation: stream 6s ease-in-out infinite; z-index: 0; }
    .data-stream:nth-child(1){left:12%;animation-delay:0s}
    .data-stream:nth-child(2){left:38%;animation-delay:1.6s}
    .data-stream:nth-child(3){left:63%;animation-delay:0.9s}
    .data-stream:nth-child(4){left:88%;animation-delay:2.3s}
    @keyframes stream { 0%{opacity:0;transform:scaleY(0) translateY(-100%)} 30%{opacity:0.28} 70%{opacity:0.28} 100%{opacity:0;transform:scaleY(1) translateY(100%)} }
    #modal-overlay { position: fixed; inset: 0; background: rgba(4,8,12,0.92); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
    #modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal { position: relative; background: rgba(8,12,16,0.97); border: 1px solid var(--neon-cyan); border-radius: 4px; padding: 44px 50px 38px; text-align: center; max-width: 430px; width: 90%; box-shadow: 0 0 0 1px rgba(0,229,255,0.1), 0 0 36px rgba(0,229,255,0.12), inset 0 0 50px rgba(0,229,255,0.02); }
    #modal-overlay.active .modal { animation: modal-in 0.4s cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes modal-in { from{transform:scale(0.88) translateY(18px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
    .modal::before,.modal::after,.modal-corner-b::before,.modal-corner-b::after { content:''; position:absolute; width:13px; height:13px; border-color:var(--neon-green); border-style:solid; }
    .modal::before{top:8px;left:8px;border-width:2px 0 0 2px}
    .modal::after{top:8px;right:8px;border-width:2px 2px 0 0}
    .modal-corner-b::before{bottom:8px;left:8px;border-width:0 0 2px 2px}
    .modal-corner-b::after{bottom:8px;right:8px;border-width:0 2px 2px 0}
    .modal-tag { font-size: 0.58rem; letter-spacing: 0.35em; color: rgba(0,255,159,0.45); margin-bottom: 10px; }
    .modal-title { font-family: 'Orbitron', sans-serif; font-size: 1.45rem; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 14px var(--neon-green), 0 0 36px rgba(0,255,159,0.35); letter-spacing: 0.1em; margin-bottom: 5px; }
    .modal-name { font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--neon-cyan); letter-spacing: 0.25em; text-shadow: 0 0 10px var(--neon-cyan); margin-bottom: 20px; }
    .modal-gif-wrap { margin: 0 auto 20px; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; width: fit-content; box-shadow: 0 0 18px rgba(0,229,255,0.12); }
    #tesoro-gif { display: block; max-width: 200px; max-height: 160px; }
    .modal-msg { font-size: 0.68rem; line-height: 1.8; color: rgba(0,229,255,0.55); letter-spacing: 0.07em; margin-bottom: 24px; }
    .modal-msg strong { color: var(--neon-cyan); }
    .btn-close { font-family: 'Orbitron', sans-serif; font-size: 0.62rem; letter-spacing: 0.3em; background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); padding: 10px 26px; cursor: pointer; border-radius: 2px; text-transform: uppercase; transition: background 0.2s, color 0.2s, box-shadow 0.2s; }
    .btn-close:hover { background: var(--neon-pink); color: #080c10; box-shadow: 0 0 18px var(--neon-pink); }
  </style>
</head>

  <script>
    const guardian = document.getElementById('guardian');
    const dot = document.getElementById('cursor-dot');
    let mx = window.innerWidth/2, my = window.innerHeight/2;
    let gx = mx, gy = my;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px'; });
    function follow(){ gx+=(mx-gx)*0.1; gy+=(my-gy)*0.1; guardian.style.left=gx+'px'; guardian.style.top=gy+'px'; requestAnimationFrame(follow); }
    follow();
    const overlay=document.getElementById('modal-overlay');
    document.getElementById('chest').addEventListener('click',()=>overlay.classList.add('active'));
    document.getElementById('btn-close').addEventListener('click',()=>overlay.classList.remove('active'));
    overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.classList.remove('active'); });
  </script>
